<form class="booking-form" id="bookingForm" action="https://script.google.com/macros/s/AKfycbyoRdEDAfbjHUrzU1-xFZ9RfLvI6SftqeFkHo7hOVfT6l9NOIqg1UOKjDl2v33RH4k-/exec" method="POST">
    <h3 style="color: var(--white); margin-bottom: 1rem; font-size: 1.5rem;">Request an Appointment</h3>
    
    <div class="form-group">
        <label for="fullName">Full Name *</label>
        <input type="text" id="fullName" name="fullName" required>
    </div>
    
    <div class="form-group">
        <label for="phone">Contact Number *</label>
        <input type="tel" id="phone" name="phone" placeholder="e.g., 0917-000-0000" required>
    </div>
    
    <div class="form-group">
        <label for="vehicle">Vehicle Make & Model *</label>
        <input type="text" id="vehicle" name="vehicle" placeholder="e.g., Toyota Vios 2019" required>
    </div>

    <div class="form-group">
        <label for="service">Service Needed *</label>
        <select id="service" name="service" required>
            <option value="" disabled selected>Select a service...</option>
            <option>Repainting / Washover</option>
            <option>Electrical Service</option>
            <option>Engine Overhaul</option>
            <option>Diagnose Trouble Code</option>
            <option>Body Repair / Welding</option>
            <option>Order Spare Parts</option>
            <option>Other General Maintenance</option>
        </select>
    </div>

    <div class="form-group">
        <label for="problem">Additional Details</label>
        <textarea id="problem" name="problem" rows="3" placeholder="Describe any specific issues you are experiencing..."></textarea>
    </div>

    <button type="submit" class="btn btn-red" style="width: 100%; margin-top: 1rem; font-size: 1.1rem;">Submit Request</button>
</form>

<div class="about-image fade-up">
    <img src="./images/jmautoshop-team.jpg" alt="JM Autoshop Garage Front" style="width: 100%; height: 100%; object-fit: cover; border-radius: 8px;">
</div>

<script>
    document.getElementById('bookingForm').addEventListener('submit', function(e) {
        e.preventDefault(); 
        
        const form = e.target;
        const btn = form.querySelector('button');
        const originalBtnText = btn.innerText;
        
        btn.innerText = "Sending...";
        btn.disabled = true;

        // Using URLSearchParams ensures the data is formatted correctly for Google Apps Script
        const formData = new FormData(form);
        const queryString = new URLSearchParams(formData).toString();
        const action = form.action;

        fetch(action + "?" + queryString, {
            method: 'POST',
            mode: 'no-cors' 
        })
        .then(() => {
            const successMsg = document.getElementById('formSuccess');
            successMsg.style.display = 'block';
            form.reset();
            btn.innerText = originalBtnText;
            btn.disabled = false;
            setTimeout(() => { successMsg.style.display = 'none'; }, 5000);
        })
        .catch(error => {
            console.error("Error!", error);
            alert("Something went wrong. Please try again or message us on Facebook!");
            btn.innerText = originalBtnText;
            btn.disabled = false;
        });
    });
</script>
